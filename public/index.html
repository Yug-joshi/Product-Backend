<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Store Inventory</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f9fafb;
            --surface-color: #ffffff;
            --surface-border: #e5e7eb;
            --text-primary: #111827;
            --text-secondary: #6b7280;
            --accent: #2563eb;
            --accent-hover: #1d4ed8;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            width: 100%;
            padding: 2rem 2rem 1.5rem 2rem;
            text-align: center;
        }

        h1 {
            font-size: 2rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 1.5rem;
        }

        .controls {
            margin: 1.5rem 0;
            display: flex;
            gap: 1rem;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
        }

        select,
        input,
        button {
            font-family: 'Inter', sans-serif;
            font-size: 0.9rem;
            outline: none;
        }

        .input-field {
            background-color: var(--surface-color);
            border: 1px solid var(--surface-border);
            color: var(--text-primary);
            padding: 0.5rem 1rem;
            border-radius: 6px;
            transition: all 0.2s ease;
        }

        .input-field:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 2px rgba(37, 99, 235, 0.2);
        }

        .btn-primary {
            background-color: var(--accent);
            border: none;
            color: white;
            padding: 0.5rem 1.25rem;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.2s ease;
        }

        .btn-primary:hover {
            background-color: var(--accent-hover);
        }

        .add-product-form {
            display: flex;
            gap: 0.75rem;
            flex-wrap: wrap;
            justify-content: center;
            background: var(--surface-color);
            padding: 1rem;
            border-radius: 8px;
            border: 1px solid var(--surface-border);
            margin-bottom: 1.5rem;
            max-width: 800px;
            margin-left: auto;
            margin-right: auto;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.05);
        }

        main {
            width: 100%;
            max-width: 1000px;
            padding: 0 1.5rem 3rem 1.5rem;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 1rem;
            width: 100%;
            margin-bottom: 2rem;
        }

        .card {
            background-color: var(--surface-color);
            border: 1px solid var(--surface-border);
            border-radius: 8px;
            padding: 1rem;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            display: flex;
            flex-direction: column;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.05);
        }

        .card:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }

        .card-category {
            font-size: 0.7rem;
            color: var(--accent);
            font-weight: 600;
            margin-bottom: 0.4rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .card-title {
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 0.75rem;
            color: var(--text-primary);
        }

        .card-price {
            font-size: 1.15rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-top: auto;
        }

        .empty-state {
            text-align: center;
            padding: 3rem;
            color: var(--text-secondary);
            grid-column: 1 / -1;
        }

        .pagination {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            width: 100%;
        }

        .page-indicator {
            font-size: 0.95rem;
            font-weight: 500;
            color: var(--text-primary);
            padding: 0.4rem 1rem;
            background: var(--bg-color);
        }

        .btn-page {
            background: var(--surface-color);
            border: 1px solid var(--surface-border);
            color: var(--text-primary);
            padding: 0.5rem 1rem;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.2s ease;
            font-size: 0.9rem;
        }

        .btn-page:hover:not(:disabled) {
            background: #f3f4f6;
            border-color: #d1d5db;
        }

        .btn-page:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            background: #f9fafb;
        }
    </style>
</head>

<body>

    <header>
        <h1>Store Inventory</h1>

        <!-- ADD PRODUCT FORM -->
        <form class="add-product-form" id="addProductForm">
            <input type="text" id="addName" class="input-field" placeholder="Product Name" required>
            <select id="addCategory" class="input-field" required>
                <option value="" disabled selected>Select Category</option>
                <option value="Electronics">Electronics</option>
                <option value="Books">Books</option>
                <option value="Home">Home</option>
                <option value="Toys">Toys</option>
                <option value="Clothing">Clothing</option>
            </select>
            <input type="number" step="0.01" id="addPrice" class="input-field" placeholder="Price (e.g. 99.99)"
                required>
            <button type="submit" class="btn-primary">Add Product</button>
        </form>

        <div class="controls" style="width: 100%; max-width: 1000px; justify-content: space-between;">
            <button id="simulateBtn" class="btn-primary" style="background-color: #10b981;">Simulate 50 Inserts</button>

            <div style="display: flex; gap: 0.5rem; flex-wrap: wrap; justify-content: center; align-items: center;">
                <!-- Independent Search Form -->
                <form id="searchForm" style="display: flex; gap: 0.5rem; margin: 0;">
                    <input type="text" id="searchFilter" class="input-field" placeholder="Search names..."
                        style="width: 180px;">
                    <button type="submit" class="btn-primary">Search</button>
                </form>

                <div style="width: 1px; height: 2rem; background-color: var(--surface-border); margin: 0 0.5rem;"></div>

                <!-- Independent Filter Form -->
                <form id="filterForm" style="display: flex; gap: 0.5rem; margin: 0;">
                    <select id="categoryFilter" class="input-field">
                        <option value="">All Categories</option>
                        <option value="Electronics">Electronics</option>
                        <option value="Books">Books</option>
                        <option value="Home">Home</option>
                        <option value="Toys">Toys</option>
                        <option value="Clothing">Clothing</option>
                    </select>
                    <input type="number" id="minPrice" class="input-field" placeholder="Min ₹" style="width: 80px;">
                    <input type="number" id="maxPrice" class="input-field" placeholder="Max ₹" style="width: 80px;">
                    <button type="submit" class="btn-primary"
                        style="background-color: var(--text-primary);">Filter</button>
                </form>
            </div>
        </div>
    </header>

    <main>
        <div class="grid" id="productGrid"></div>

        <div class="pagination" id="paginationControls">
            <button id="prevBtn" class="btn-page" disabled>&larr; Prev</button>
            <div class="page-indicator" id="pageIndicator">Page 1</div>
            <button id="nextBtn" class="btn-page">Next &rarr;</button>
        </div>
    </main>

    <script>
        // Force the API base URL to 127.0.0.1:3000 just in case the user opens index.html locally.
        const API_BASE = window.location.protocol === 'file:' ? 'https://product-backend-hgu2.onrender.com' : '';

        const grid = document.getElementById('productGrid');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const pageIndicator = document.getElementById('pageIndicator');
        const searchForm = document.getElementById('searchForm');
        const filterForm = document.getElementById('filterForm');
        const searchFilter = document.getElementById('searchFilter');
        const categoryFilter = document.getElementById('categoryFilter');
        const minPriceFilter = document.getElementById('minPrice');
        const maxPriceFilter = document.getElementById('maxPrice');
        const addProductForm = document.getElementById('addProductForm');
        const simulateBtn = document.getElementById('simulateBtn');

        let cursorHistory = [null]; // Stores cursors for pages. Index 0 is Page 1 (null cursor).
        let currentPageIndex = 0;
        let isLoading = false;

        function createProductCard(product) {
            const el = document.createElement('div');
            el.className = 'card';
            el.innerHTML = `
                <div class="card-category">${product.category}</div>
                <div class="card-title">${product.name}</div>
                <div class="card-price">₹${Number(product.price).toFixed(2)}</div>
            `;
            return el;
        }

        async function fetchProducts() {
            if (isLoading) return;
            isLoading = true;
            grid.innerHTML = ''; // Clear for new page

            const search = searchFilter.value;
            const category = categoryFilter.value;
            const minPrice = minPriceFilter.value;
            const maxPrice = maxPriceFilter.value;

            let url = `${API_BASE}/api/products?limit=12`;
            if (search) url += `&search=${encodeURIComponent(search)}`;
            if (category) url += `&category=${encodeURIComponent(category)}`;
            if (minPrice) url += `&minPrice=${encodeURIComponent(minPrice)}`;
            if (maxPrice) url += `&maxPrice=${encodeURIComponent(maxPrice)}`;

            const cursor = cursorHistory[currentPageIndex];
            if (cursor) url += `&cursor=${encodeURIComponent(cursor)}`;

            try {
                const response = await fetch(url);
                if (!response.ok) throw new Error('Network response was not ok');
                const data = await response.json();

                if (data.data.length === 0) {
                    grid.innerHTML = '<div class="empty-state"><h3>No products found</h3></div>';
                }

                data.data.forEach(product => {
                    grid.appendChild(createProductCard(product));
                });

                // If this is the last page we've fetched so far, save the next cursor
                if (currentPageIndex === cursorHistory.length - 1) {
                    cursorHistory.push(data.nextCursor);
                }

                // Update UI
                pageIndicator.innerText = `Page ${currentPageIndex + 1}`;
                prevBtn.disabled = currentPageIndex === 0;
                nextBtn.disabled = !data.nextCursor;

            } catch (err) {
                console.error('Failed to fetch products', err);
                grid.innerHTML = '<div class="empty-state"><h3>Error connecting to backend API.</h3></div>';
            } finally {
                isLoading = false;
            }
        }

        addProductForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('addName').value;
            const category = document.getElementById('addCategory').value;
            const price = document.getElementById('addPrice').value;

            try {
                const res = await fetch(`${API_BASE}/api/products`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, category, price })
                });

                if (res.ok) {
                    alert('Product added successfully!');
                    addProductForm.reset();
                    // Reset pagination
                    cursorHistory = [null];
                    currentPageIndex = 0;
                    fetchProducts();
                } else {
                    alert('Failed to add product.');
                }
            } catch (err) {
                alert('Error connecting to backend.');
            }
        });

        simulateBtn.addEventListener('click', async () => {
            simulateBtn.disabled = true;
            simulateBtn.innerText = "Simulating...";
            try {
                const res = await fetch(`${API_BASE}/api/products/simulate`, { method: 'POST' });
                if (res.ok) {
                    alert("✅ 50 random items added to the top of the database!\n\nTry clicking 'Next →' to verify your current pagination isn't broken. (If this was OFFSET pagination, you would see duplicates!)");
                } else {
                    alert("Failed to simulate.");
                }
            } catch (err) {
                alert("Error connecting to backend.");
            } finally {
                simulateBtn.disabled = false;
                simulateBtn.innerText = "Simulate 50 Inserts";
            }
        });

        prevBtn.addEventListener('click', () => {
            if (currentPageIndex > 0) {
                currentPageIndex--;
                fetchProducts();
            }
        });

        nextBtn.addEventListener('click', () => {
            if (cursorHistory[currentPageIndex + 1]) {
                currentPageIndex++;
                fetchProducts();
            }
        });

        searchForm.addEventListener('submit', (e) => {
            e.preventDefault();
            // Clear filters so search works independently
            categoryFilter.value = '';
            minPriceFilter.value = '';
            maxPriceFilter.value = '';

            cursorHistory = [null];
            currentPageIndex = 0;
            fetchProducts();
        });

        filterForm.addEventListener('submit', (e) => {
            e.preventDefault();
            // Clear search so filter works independently
            searchFilter.value = '';

            cursorHistory = [null];
            currentPageIndex = 0;
            fetchProducts();
        });

        // Initial Load
        fetchProducts();
    </script>
</body>

</html>
